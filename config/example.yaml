# AMP 配置文件示例

project:
  name: "My Project"
  description: "Project using AMP agents"

agents:
  - name: Ali
    role: project_manager
    language: zh
    capabilities:
      - coordination
      - planning
      - reporting

  - name: 探索者
    role: researcher
    language: zh
    capabilities:
      - research
      - analysis
      - web_search

  - name: 记录员
    role: writer
    language: zh
    capabilities:
      - documentation
      - summarization

tasks:
  - description: "研究 AI 框架"
    assign_to: 探索者
    priority: 8
    tags: [research, ai]

  - description: "生成项目报告"
    assign_to: Ali
    priority: 7
    tags: [reporting, documentation]

  - description: "整理会议记录"
    assign_to: 记录员
    priority: 6
    tags: [documentation, meeting]

settings:
  storage_dir: ~/.amp/agents
  log_level: INFO
  consolidate_after: true

# Memory Bank 集成
memory_bank:
  enabled: true
  url: http://localhost:8100
  auto_sync: true
  min_importance: 5

# OpenClaw 集成
openclaw:
  enabled: true
  gateway_url: http://localhost:18789
  spawn_subagents: true
